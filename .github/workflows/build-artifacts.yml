name: Build Artifacts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run verification suite
        run: ./gradlew :composeApp:jvmTest :shared:jvmTest :composeApp:compileKotlinJvm :composeApp:compileDebugKotlinAndroid

  desktop:
    name: Desktop ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            gradle-command: .\gradlew.bat
            artifact-name: lunar-desktop-windows
            artifact-paths: |
              composeApp/build/compose/binaries/main-release/app/**
              composeApp/build/compose/binaries/main-release/exe/**
              composeApp/build/compose/binaries/main-release/msi/**
          - os: ubuntu-latest
            label: Linux
            gradle-command: ./gradlew
            artifact-name: lunar-desktop-linux
            artifact-paths: |
              composeApp/build/compose/binaries/main-release/app/**
              composeApp/build/compose/binaries/main-release/deb/**
          - os: macos-latest
            label: macOS
            gradle-command: ./gradlew
            artifact-name: lunar-desktop-macos
            artifact-paths: |
              composeApp/build/compose/binaries/main-release/app/**
              composeApp/build/compose/binaries/main-release/dmg/**

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew
        shell: bash

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot
        shell: bash

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: choco install wixtoolset --no-progress --yes
        shell: pwsh

      - name: Locate WiX Toolset
        if: runner.os == 'Windows'
        run: |
          $wixDir = Get-ChildItem 'C:\Program Files (x86)' -Directory |
            Where-Object { $_.Name -like 'WiX Toolset v*' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $wixDir) {
            throw 'WiX Toolset install directory not found.'
          }
          "WIX_PATH=$($wixDir.FullName)\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Build Windows desktop artifacts
        if: runner.os == 'Windows'
        run: |
          & "${{ matrix.gradle-command }}" :composeApp:createReleaseDistributable :composeApp:packageReleaseDistributionForCurrentOS
        shell: pwsh

      - name: Build desktop artifacts
        if: runner.os != 'Windows'
        run: |
          & "${{ matrix.gradle-command }}" :composeApp:createReleaseDistributable :composeApp:packageReleaseDistributionForCurrentOS
        shell: pwsh

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ matrix.artifact-paths }}

  android:
    name: Android Release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Android release artifacts
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lunar-android-release
          if-no-files-found: error
          retention-days: 14
          path: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
